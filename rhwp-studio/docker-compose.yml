services:
  rhwp-studio:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rhwp-studio-dev
    ports:
      - "7700:7700"
    volumes:
      # 전체 프로젝트 디렉토리 마운트 (Coolify 호환)
      - .:/app
      # node_modules 은 컨테이너 내부 사용 (볼륨 제외)
      - /app/node_modules
    environment:
      - NODE_ENV=development
    restart: unless-stopped
